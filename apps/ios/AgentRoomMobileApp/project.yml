name: AgentRoomMobileApp
options:
  bundleIdPrefix: com.agentroom
  deploymentTarget:
    iOS: "17.0"
targets:
  AgentRoomMobileApp:
    type: application
    platform: iOS
    sources:
      - path: ../AgentRoomMobile/Sources/AgentRoomMobile
      - path: Sources/AgentRoomMobileApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentroom.mobile
        PRODUCT_NAME: AgentRoomMobileApp
        PRODUCT_MODULE_NAME: AgentRoomMobileApp
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/AgentRoomMobileApp/Info.plist
        TARGETED_DEVICE_FAMILY: 1
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGNING_ALLOWED: NO
        SUPPORTED_PLATFORMS: iphoneos iphonesimulator
        SUPPORTS_MACCATALYST: NO
  AgentRoomMobileAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/AgentRoomMobileAppTests
    dependencies:
      - target: AgentRoomMobileApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentroom.mobile.tests
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: 1
        CODE_SIGNING_ALLOWED: NO
        SUPPORTED_PLATFORMS: iphoneos iphonesimulator
        SUPPORTS_MACCATALYST: NO
schemes:
  AgentRoomMobileApp:
    build:
      targets:
        AgentRoomMobileApp: all
        AgentRoomMobileAppTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AgentRoomMobileAppTests
